<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 116" width="400" height="116" fill="none" role="img" aria-label="Aumiqx — live">
  <title>Aumiqx — open live site</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f1116"/><stop offset="1" stop-color="#141821"/></linearGradient>
    <clipPath id="c"><rect x="4" y="4" width="392" height="108" rx="14"/></clipPath>
    <style>
      text{ font-family:'JetBrains Mono',ui-monospace,'SFMono-Regular',Consolas,monospace }
      .s{ font-family:'Inter','SF Pro Display',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif }
      .dot{ animation:b 1.7s ease-in-out infinite } @keyframes b{0%,100%{opacity:1}50%{opacity:.3}}
      @media (prefers-reduced-motion:reduce){ .dot{animation:none} }
    </style>
  </defs>
  <g clip-path="url(#c)">
    <rect x="4" y="4" width="392" height="108" rx="14" fill="url(#bg)"/>
    <circle cx="30" cy="34" r="6" fill="#5fae7f" class="dot"/>
    <text x="48" y="40" font-size="12" letter-spacing="2" fill="#5fae7f">LIVE</text>
    <text x="392" y="40" text-anchor="end" font-size="12" fill="#99a0af">200 · OK</text>
    <text x="26" y="76" class="s" font-size="24" font-weight="700" fill="#e9ebf0">Aumiqx</text>
    <text x="26" y="98" font-size="13" fill="#99a0af">the company</text>
    <text x="392" y="98" text-anchor="end" font-size="13" fill="#d7a13b">open ↗</text>
    <rect x="5" y="5" width="390" height="106" rx="13" fill="none" stroke="#2a2f3a" stroke-width="1.2" opacity="0.9"/>
  </g>
</svg>

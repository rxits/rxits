<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 214" width="860" height="214" fill="none" role="img" aria-label="Field reports — client testimonials in collection. Quotes from air-up, Beast and NY Elizabeth are pending sign-off. Placeholder cards.">
  <title>Field reports — client testimonials (pending sign-off, placeholders)</title>
  <desc>Three placeholder testimonial cards for air-up, Beast and NY Elizabeth. Real quotes are being collected; none are shown yet.</desc>
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f1116"/><stop offset="1" stop-color="#141821"/></linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="fw"><rect x="8" y="8" width="844" height="198" rx="16"/></clipPath>
    <style>
      text{ font-family:'JetBrains Mono',ui-monospace,'SFMono-Regular',Consolas,'Liberation Mono',monospace; }
      .s{ font-family:'Inter','SF Pro Display',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; }
      .dot{ animation:blink 1.9s ease-in-out infinite } @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
      .sheen{ animation:sweep 3.6s ease-in-out infinite }
      @keyframes sweep{ 0%{transform:translateX(-380px)} 60%,100%{transform:translateX(900px)} }
      @media (prefers-reduced-motion:reduce){ .dot{animation:none} .sheen{display:none} }
    </style>
  </defs>
  <g clip-path="url(#fw)">
    <rect x="8" y="8" width="844" height="198" rx="16" fill="url(#fbg)"/>

    <text x="24" y="30" font-size="11" letter-spacing="3" fill="#99a0af">◈ FIELD REPORTS</text>
    <text x="836" y="30" text-anchor="end" font-size="10" letter-spacing="1" fill="#d7a13b">quotes in collection · sign-off pending</text>
    <line x1="20" y1="42" x2="840" y2="42" stroke="#2a2f3a" stroke-opacity="0.9"/>

    <!-- card 1: air-up -->
    <g>
      <rect x="24" y="58" width="258" height="132" rx="12" fill="#171a21" stroke="#2a2f3a" stroke-width="1"/>
      <circle cx="42" cy="84" r="4" fill="#d7a13b" class="dot"/>
      <text x="54" y="88" class="s" font-size="13" font-weight="700" fill="#e9ebf0">air-up</text>
      <text x="268" y="88" text-anchor="end" font-size="8.5" letter-spacing="1" fill="#d7a13b">PENDING</text>
      <text x="42" y="104" font-size="10" fill="#99a0af">Germany · €200M DTC</text>
      <rect x="42" y="116" width="222" height="8" rx="4" fill="#262b34"/>
      <rect x="42" y="130" width="188" height="8" rx="4" fill="#262b34"/>
      <text x="153" y="162" text-anchor="middle" font-size="11" fill="#99a0af">[ testimonial — coming ]</text>
      <text x="42" y="180" font-size="9.5" fill="#99a0af">— quote pending sign-off</text>
    </g>

    <!-- card 2: Beast -->
    <g>
      <rect x="300" y="58" width="258" height="132" rx="12" fill="#171a21" stroke="#2a2f3a" stroke-width="1"/>
      <circle cx="318" cy="84" r="4" fill="#d7a13b" class="dot"/>
      <text x="330" y="88" class="s" font-size="13" font-weight="700" fill="#e9ebf0">Beast</text>
      <text x="544" y="88" text-anchor="end" font-size="8.5" letter-spacing="1" fill="#d7a13b">PENDING</text>
      <text x="318" y="104" font-size="10" fill="#99a0af">London · Cannes Lions</text>
      <rect x="318" y="116" width="222" height="8" rx="4" fill="#262b34"/>
      <rect x="318" y="130" width="176" height="8" rx="4" fill="#262b34"/>
      <text x="429" y="162" text-anchor="middle" font-size="11" fill="#99a0af">[ testimonial — coming ]</text>
      <text x="318" y="180" font-size="9.5" fill="#99a0af">— quote pending sign-off</text>
    </g>

    <!-- card 3: NY Elizabeth -->
    <g>
      <rect x="576" y="58" width="258" height="132" rx="12" fill="#171a21" stroke="#2a2f3a" stroke-width="1"/>
      <circle cx="594" cy="84" r="4" fill="#d7a13b" class="dot"/>
      <text x="606" y="88" class="s" font-size="13" font-weight="700" fill="#e9ebf0">NY Elizabeth</text>
      <text x="820" y="88" text-anchor="end" font-size="8.5" letter-spacing="1" fill="#d7a13b">PENDING</text>
      <text x="594" y="104" font-size="10" fill="#99a0af">luxury auction house</text>
      <rect x="594" y="116" width="222" height="8" rx="4" fill="#262b34"/>
      <rect x="594" y="130" width="200" height="8" rx="4" fill="#262b34"/>
      <text x="705" y="162" text-anchor="middle" font-size="11" fill="#99a0af">[ testimonial — coming ]</text>
      <text x="594" y="180" font-size="9.5" fill="#99a0af">— quote pending sign-off</text>
    </g>

    <!-- global sheen (skeleton shimmer) -->
    <rect class="sheen" x="0" y="58" width="220" height="132" fill="url(#sheen)"/>

    <rect x="9" y="9" width="842" height="196" rx="15" fill="none" stroke="#2a2f3a" stroke-width="1.2"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500" width="840" height="500" fill="none" role="img" aria-label="rxit.os — agent operating system booting">
  <title>rxit.os — agent operating system</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0d20"/>
      <stop offset="0.55" stop-color="#0b0b1a"/>
      <stop offset="1" stop-color="#120a1f"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="0.5" stop-color="#7a3cff"/>
      <stop offset="1" stop-color="#ff00e5"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="1" stop-color="#39ff14"/>
    </linearGradient>
    <radialGradient id="vign" cx="0.5" cy="0.35" r="0.9">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#2a2a55" stroke-opacity="0.18" stroke-width="1"/>
    </pattern>
    <clipPath id="win"><rect x="10" y="10" width="820" height="480" rx="16"/></clipPath>
    <clipPath id="tclip"><rect x="20" y="210" height="24" width="0"><animate attributeName="width" from="0" to="360" dur="1.4s" begin="3.0s" fill="freeze"/></rect></clipPath>

    <style>
      text{ font-family:'JetBrains Mono','SFMono-Regular',Consolas,'Liberation Mono',monospace; }
      .dim{ fill:#7f7fb0; } .brt{ fill:#e9e9ff; } .cy{ fill:#00f0ff; } .mg{ fill:#ff2ee6; }
      .gr{ fill:#39ff14; } .rd{ fill:#ff2d6f; } .yl{ fill:#ffb020; }
      .ln{ opacity:0; animation:appear .35s ease forwards; }
      .l1{ animation-delay:.9s } .l2{ animation-delay:1.25s } .l3{ animation-delay:1.6s }
      .l4{ animation-delay:1.95s } .l5{ animation-delay:2.3s } .l6{ animation-delay:2.65s }
      @keyframes appear{ from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
      .cur{ animation:blink 1.05s steps(1) infinite; }
      @keyframes blink{ 50%{opacity:0} }
      .cell{ fill:#182046; }
      .on{ animation:cell 3.4s ease-in-out infinite; }
      @keyframes cell{ 0%,100%{fill:#182046} 40%,70%{fill:#39ff14} }
      .b{ transform-box:fill-box; transform-origin:bottom; animation:pump 2.6s ease-in-out infinite; }
      @keyframes pump{ 0%,100%{transform:scaleY(.25)} 50%{transform:scaleY(1)} }
      .scan{ animation:sweep 5.5s linear infinite; }
      @keyframes sweep{ 0%{transform:translateY(0);opacity:0} 8%{opacity:.5} 92%{opacity:.5} 100%{transform:translateY(430px);opacity:0} }
      .pdot{ animation:pd 1.6s ease-in-out infinite; }
      @keyframes pd{ 0%,100%{opacity:1} 50%{opacity:.25} }
      @media (prefers-reduced-motion: reduce){
        .ln,.cur,.on,.b,.scan,.pdot{ animation:none; opacity:1 }
        .ln{ transform:none }
      }
    </style>
  </defs>

  <g clip-path="url(#win)">
    <rect x="10" y="10" width="820" height="480" rx="16" fill="url(#bg)"/>
    <rect x="10" y="10" width="820" height="480" fill="url(#grid)"/>
    <rect x="10" y="10" width="820" height="480" fill="url(#vign)"/>

    <!-- title bar -->
    <circle cx="38" cy="34" r="6.5" fill="#ff2d6f"/>
    <circle cx="60" cy="34" r="6.5" fill="#ffb020"/>
    <circle cx="82" cy="34" r="6.5" fill="#39ff14"/>
    <text x="420" y="39" text-anchor="middle" font-size="15" letter-spacing="3" class="dim">rxit<tspan class="cy">.os</tspan></text>
    <circle cx="742" cy="34" r="5" fill="#39ff14" class="pdot"/>
    <text x="756" y="39" font-size="13" letter-spacing="1.5" class="gr">online</text>
    <line x1="10" y1="58" x2="830" y2="58" stroke="#2a2a55" stroke-opacity="0.5"/>

    <!-- big brand -->
    <text x="34" y="118" font-size="58" font-weight="700" letter-spacing="2" class="brt" filter="url(#glow)">rxit<tspan class="cy">_</tspan></text>
    <text x="40" y="146" font-size="14" letter-spacing="6" class="mg">AGENT · OPERATING · SYSTEM</text>

    <!-- boot log (left) -->
    <g font-size="14.5">
      <text x="34" y="196" class="dim">rxit@os:<tspan class="cy">~</tspan>$ <tspan class="brt">boot --os</tspan></text>
      <g clip-path="url(#tclip)">
        <text x="34" y="226" class="cy">&gt; initializing rxit.os</text>
      </g>

      <text x="34" y="256" class="ln l1"><tspan class="gr">✓</tspan> <tspan class="dim">agent-runtime</tspan> <tspan class="dim">···········</tspan> <tspan class="brt">online</tspan></text>
      <text x="34" y="286" class="ln l2"><tspan class="gr">✓</tspan> <tspan class="dim">live deployments</tspan> <tspan class="dim">·······</tspan> <tspan class="brt">8 mounted</tspan></text>
      <text x="34" y="316" class="ln l3"><tspan class="gr">✓</tspan> <tspan class="dim">operator</tspan> <tspan class="dim">················</tspan> <tspan class="brt">rxit</tspan> <tspan class="mg">[human]</tspan></text>
      <text x="34" y="346" class="ln l4"><tspan class="gr">✓</tspan> <tspan class="dim">meetings</tspan> <tspan class="dim">················</tspan> <tspan class="brt">0</tspan> <tspan class="dim">(by design)</tspan></text>
      <text x="34" y="376" class="ln l5"><tspan class="yl">▹</tspan> <tspan class="dim">now</tspan> <tspan class="dim">·····················</tspan> <tspan class="brt">shipping</tspan></text>
    </g>

    <!-- prompt -->
    <text x="34" y="430" font-size="14.5" class="ln l6"><tspan class="dim">rxit@os:</tspan><tspan class="cy">~</tspan><tspan class="dim">$</tspan> <tspan class="brt">one human, a fleet of agents</tspan><tspan class="cy cur"> ▊</tspan></text>

    <!-- right panel -->
    <line x1="486" y1="70" x2="486" y2="452" stroke="#2a2a55" stroke-opacity="0.5"/>

    <text x="512" y="182" font-size="12" letter-spacing="3" class="dim">AGENTS ONLINE</text>
    <g>
      <rect x="512" y="196" width="30" height="22" rx="4" class="cell on" style="animation-delay:.2s"/>
      <rect x="550" y="196" width="30" height="22" rx="4" class="cell on" style="animation-delay:.5s"/>
      <rect x="588" y="196" width="30" height="22" rx="4" class="cell on" style="animation-delay:.8s"/>
      <rect x="626" y="196" width="30" height="22" rx="4" class="cell on" style="animation-delay:1.1s"/>
      <rect x="664" y="196" width="30" height="22" rx="4" class="cell on" style="animation-delay:1.4s"/>
      <rect x="702" y="196" width="30" height="22" rx="4" class="cell on" style="animation-delay:1.7s"/>
      <rect x="512" y="224" width="30" height="22" rx="4" class="cell on" style="animation-delay:2.0s"/>
      <rect x="550" y="224" width="30" height="22" rx="4" class="cell on" style="animation-delay:2.3s"/>
      <rect x="588" y="224" width="30" height="22" rx="4" class="cell on" style="animation-delay:.35s"/>
      <rect x="626" y="224" width="30" height="22" rx="4" class="cell on" style="animation-delay:.95s"/>
      <rect x="664" y="224" width="30" height="22" rx="4" class="cell on" style="animation-delay:1.55s"/>
      <rect x="702" y="224" width="30" height="22" rx="4" class="cell on" style="animation-delay:2.15s"/>
    </g>

    <text x="512" y="286" font-size="12" letter-spacing="3" class="dim">THROUGHPUT</text>
    <g>
      <rect x="512" y="300" width="18" height="56" rx="3" fill="url(#bar)" class="b" style="animation-delay:0s"/>
      <rect x="540" y="300" width="18" height="56" rx="3" fill="url(#bar)" class="b" style="animation-delay:.3s"/>
      <rect x="568" y="300" width="18" height="56" rx="3" fill="url(#bar)" class="b" style="animation-delay:.6s"/>
      <rect x="596" y="300" width="18" height="56" rx="3" fill="url(#bar)" class="b" style="animation-delay:.9s"/>
      <rect x="624" y="300" width="18" height="56" rx="3" fill="url(#bar)" class="b" style="animation-delay:1.2s"/>
      <rect x="652" y="300" width="18" height="56" rx="3" fill="url(#bar)" class="b" style="animation-delay:1.5s"/>
      <rect x="680" y="300" width="18" height="56" rx="3" fill="url(#bar)" class="b" style="animation-delay:1.8s"/>
      <rect x="708" y="300" width="18" height="56" rx="3" fill="url(#bar)" class="b" style="animation-delay:2.1s"/>
    </g>

    <g font-size="13.5">
      <text x="512" y="400" class="dim">HUMANS</text>    <text x="726" y="400" text-anchor="end" class="brt">1</text>
      <text x="512" y="424" class="dim">MEETINGS</text>  <text x="726" y="424" text-anchor="end" class="brt">0</text>
      <text x="512" y="448" class="dim">UPTIME</text>    <text x="726" y="448" text-anchor="end" class="cy">∞</text>
    </g>

    <!-- scanline -->
    <rect x="10" y="60" width="820" height="2" fill="#00f0ff" opacity="0" class="scan"/>

    <!-- border -->
    <rect x="11" y="11" width="818" height="478" rx="15" fill="none" stroke="url(#edge)" stroke-width="1.5" opacity="0.9"/>
  </g>
</svg>

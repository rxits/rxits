<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 300" width="840" height="300" fill="none" role="img" aria-label="deployments — all systems live">
  <title>deployments — all systems live</title>
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0d20"/><stop offset="1" stop-color="#100a1c"/>
    </linearGradient>
    <linearGradient id="dedge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39ff14"/><stop offset="1" stop-color="#00f0ff"/>
    </linearGradient>
    <pattern id="dgrid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#2a2a55" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>
    <clipPath id="dwin"><rect x="10" y="10" width="820" height="280" rx="16"/></clipPath>
    <style>
      text{ font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace; }
      .d{ fill:#7f7fb0 } .w{ fill:#e9e9ff } .g{ fill:#39ff14 } .c{ fill:#00f0ff }
      .dot{ animation:blip 1.8s ease-in-out infinite }
      @keyframes blip{ 0%,100%{opacity:.28} 50%{opacity:1} }
      .row{ opacity:0; animation:in .4s ease forwards }
      @keyframes in{ to{opacity:1} }
      .sweep{ animation:sw 4.5s linear infinite }
      @keyframes sw{ 0%{transform:translateX(0);opacity:0} 10%{opacity:.6} 90%{opacity:.6} 100%{transform:translateX(760px);opacity:0} }
      @media (prefers-reduced-motion:reduce){ .dot,.row,.sweep{animation:none;opacity:1} }
    </style>
  </defs>
  <g clip-path="url(#dwin)">
    <rect x="10" y="10" width="820" height="280" rx="16" fill="url(#dbg)"/>
    <rect x="10" y="10" width="820" height="280" fill="url(#dgrid)"/>
    <circle cx="36" cy="38" r="5" fill="#39ff14"/>
    <text x="52" y="43" font-size="14" letter-spacing="2" class="w">DEPLOYMENTS</text>
    <text x="806" y="43" text-anchor="end" font-size="12" letter-spacing="2" class="g">◍ ALL SYSTEMS OPERATIONAL</text>
    <line x1="26" y1="58" x2="814" y2="58" stroke="#2a2a55" stroke-opacity="0.5"/>

    <g font-size="13.5">
      <g class="row" style="animation-delay:.1s"><circle cx="40" cy="92" r="5" fill="#39ff14" class="dot" style="animation-delay:0s"/><text x="56" y="97" class="w">NY Elizabeth</text><text x="404" y="97" text-anchor="end" class="d">auctions · <tspan class="g">200</tspan></text></g>
      <g class="row" style="animation-delay:.25s"><circle cx="40" cy="130" r="5" fill="#39ff14" class="dot" style="animation-delay:.3s"/><text x="56" y="135" class="w">SalesClawd</text><text x="404" y="135" text-anchor="end" class="d">agents · <tspan class="g">200</tspan></text></g>
      <g class="row" style="animation-delay:.4s"><circle cx="40" cy="168" r="5" fill="#39ff14" class="dot" style="animation-delay:.6s"/><text x="56" y="173" class="w">Art Index</text><text x="404" y="173" text-anchor="end" class="d">marketplace · <tspan class="g">200</tspan></text></g>
      <g class="row" style="animation-delay:.55s"><circle cx="40" cy="206" r="5" fill="#39ff14" class="dot" style="animation-delay:.9s"/><text x="56" y="211" class="w">Aumiqx</text><text x="404" y="211" text-anchor="end" class="d">company · <tspan class="g">200</tspan></text></g>
      <g class="row" style="animation-delay:.7s"><circle cx="440" cy="92" r="5" fill="#39ff14" class="dot" style="animation-delay:.15s"/><text x="456" y="97" class="w">air-up</text><text x="804" y="97" text-anchor="end" class="d">€200M brand · <tspan class="g">200</tspan></text></g>
      <g class="row" style="animation-delay:.85s"><circle cx="440" cy="130" r="5" fill="#39ff14" class="dot" style="animation-delay:.45s"/><text x="456" y="135" class="w">Beast</text><text x="804" y="135" text-anchor="end" class="d">Cannes studio · <tspan class="g">200</tspan></text></g>
      <g class="row" style="animation-delay:1s"><circle cx="440" cy="168" r="5" fill="#39ff14" class="dot" style="animation-delay:.75s"/><text x="456" y="173" class="w">Yoginii</text><text x="804" y="173" text-anchor="end" class="d">wellness · <tspan class="g">200</tspan></text></g>
      <g class="row" style="animation-delay:1.15s"><circle cx="440" cy="206" r="5" fill="#39ff14" class="dot" style="animation-delay:1.05s"/><text x="456" y="211" class="w">Rockport IN</text><text x="804" y="211" text-anchor="end" class="d">footwear · <tspan class="g">200</tspan></text></g>
    </g>

    <line x1="26" y1="238" x2="814" y2="238" stroke="#2a2a55" stroke-opacity="0.5"/>
    <text x="40" y="266" font-size="12.5" class="d">uptime <tspan class="c">∞</tspan> · humans <tspan class="w">1</tspan> · agents <tspan class="w">n</tspan> · incidents <tspan class="w">0</tspan></text>
    <text x="804" y="266" text-anchor="end" font-size="12.5" class="g">● live</text>

    <rect x="12" y="60" width="60" height="178" fill="#39ff14" opacity="0" class="sweep"/>
    <rect x="11" y="11" width="818" height="278" rx="15" fill="none" stroke="url(#dedge)" stroke-width="1.4" opacity="0.85"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 270" width="840" height="270" fill="none" role="img" aria-label="rxit.os arcade — pong, playing itself">
  <title>rxit.os arcade — pong</title>
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d0d20"/><stop offset="1" stop-color="#100a1c"/></linearGradient>
    <linearGradient id="pedge" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00f0ff"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
    <clipPath id="pw"><rect x="6" y="6" width="828" height="258" rx="14"/></clipPath>
    <filter id="pglow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      text{ font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace }
      .ball{ animation:ball 6s linear infinite }
      .lp{ animation:lp 6s linear infinite }
      .rp{ animation:rp 6s linear infinite }
      /* ball center travels between left face (x62) and right face (x778); paddles intercept */
      @keyframes ball{
        0%{transform:translate(62px,170px)}
        16.667%{transform:translate(778px,120px)}
        33.333%{transform:translate(62px,210px)}
        50%{transform:translate(778px,150px)}
        66.667%{transform:translate(62px,120px)}
        83.333%{transform:translate(778px,200px)}
        100%{transform:translate(62px,170px)}
      }
      /* left paddle top = ball-y − 24, only pinned at left-contact times */
      @keyframes lp{
        0%{transform:translateY(146px)}
        33.333%{transform:translateY(186px)}
        66.667%{transform:translateY(96px)}
        100%{transform:translateY(146px)}
      }
      /* right paddle top pinned at right-contact times */
      @keyframes rp{
        0%{transform:translateY(146px)}
        16.667%{transform:translateY(96px)}
        50%{transform:translateY(126px)}
        83.333%{transform:translateY(176px)}
        100%{transform:translateY(146px)}
      }
      @media (prefers-reduced-motion:reduce){ .ball,.lp,.rp{animation:none} }
    </style>
  </defs>
  <g clip-path="url(#pw)">
    <rect x="6" y="6" width="828" height="258" rx="14" fill="url(#pbg)"/>

    <text x="30" y="38" font-size="12" letter-spacing="3" fill="#00f0ff">◉ rxit.os // arcade</text>
    <text x="810" y="38" text-anchor="end" font-size="11" fill="#7f7fb0">pong · it plays itself</text>
    <line x1="20" y1="52" x2="820" y2="52" stroke="#2a2a55" stroke-opacity="0.5"/>

    <!-- scoreboard -->
    <text x="360" y="82" text-anchor="end" font-size="20" font-weight="700" fill="#00f0ff">rxit 07</text>
    <text x="420" y="82" text-anchor="middle" font-size="16" fill="#7f7fb0">:</text>
    <text x="480" y="82" text-anchor="start" font-size="20" font-weight="700" fill="#ff2ee6">05 cpu</text>

    <!-- court: x 40..800, y 92..258 -->
    <rect x="40" y="92" width="760" height="166" rx="6" fill="none" stroke="#2a2a55" stroke-opacity="0.6"/>
    <line x1="420" y1="98" x2="420" y2="252" stroke="#2a2a55" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="6 8"/>

    <!-- paddles: rect drawn at y=0 h=48, translateY sets the TOP (= ball-y − 24) -->
    <rect class="lp" x="46" y="0" width="10" height="48" rx="4" fill="#00f0ff" filter="url(#pglow)"/>
    <rect class="rp" x="784" y="0" width="10" height="48" rx="4" fill="#ff2ee6" filter="url(#pglow)"/>

    <!-- ball: drawn centered on origin, translate sets its CENTER -->
    <rect class="ball" x="-6" y="-6" width="12" height="12" rx="2" fill="#39ff14" filter="url(#pglow)"/>

    <rect x="7" y="7" width="826" height="256" rx="13" fill="none" stroke="url(#pedge)" stroke-width="1.3" opacity="0.85"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 168" width="840" height="168" fill="none" role="img" aria-label="rxit.os hot-take, auto-rotating">
  <title>rxit.os // transmission</title>
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d0d20"/><stop offset="1" stop-color="#100a1c"/></linearGradient>
    <linearGradient id="hedge" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00f0ff"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
    <clipPath id="hw"><rect x="6" y="6" width="828" height="156" rx="14"/></clipPath>
    <style>
      text{ font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace }
      .t{ opacity:0; animation:cyc 57.6s linear infinite }
      @keyframes cyc{0%{opacity:0}0.60%{opacity:1}5.05%{opacity:1}5.65%{opacity:0}100%{opacity:0}}
      .p{ animation:pl 1.5s ease-in-out infinite } @keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
      @media (prefers-reduced-motion:reduce){ .t{animation:none} .t:first-of-type{opacity:1} .p{animation:none} }
    </style>
  </defs>
  <g clip-path="url(#hw)">
    <rect x="6" y="6" width="828" height="156" rx="14" fill="url(#hbg)"/>
    <circle cx="30" cy="32" r="5" fill="#00f0ff" class="p"/>
    <text x="44" y="37" font-size="12" letter-spacing="3" fill="#00f0ff">◉ rxit.os // transmission</text>
    <text x="810" y="37" text-anchor="end" font-size="11" fill="#7f7fb0">auto-rotating · 16 takes</text>
    <line x1="20" y1="50" x2="820" y2="50" stroke="#2a2a55" stroke-opacity="0.5"/>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:0.00s"><tspan x="420" dy="0">headcount is a lagging indicator of</tspan><tspan x="420" dy="32">avoiding automation.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:3.60s"><tspan x="420" dy="0">if your agent needs babysitting, it's an</tspan><tspan x="420" dy="32">intern.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:7.20s"><tspan x="420" dy="0">'we'll need a team for that' is usually</tspan><tspan x="420" dy="32">a weekend.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:10.80s"><tspan x="420" dy="0">agents don’t do standups. that’s the</tspan><tspan x="420" dy="32">whole pitch.</tspan></text>
    <text class="t" x="420" y="98" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:14.40s"><tspan x="420" dy="0">if it isn't live, it's a rumor.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:18.00s"><tspan x="420" dy="0">meetings are standups that lost the</tspan><tspan x="420" dy="32">plot.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:21.60s"><tspan x="420" dy="0">one human, a fleet of agents, zero</tspan><tspan x="420" dy="32">all-hands.</tspan></text>
    <text class="t" x="420" y="98" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:25.20s"><tspan x="420" dy="0">the demo is the spec.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:28.80s"><tspan x="420" dy="0">the roadmap is written in pencil and</tspan><tspan x="420" dy="32">shipped in prod.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:32.40s"><tspan x="420" dy="0">the best team i ever hired was a</tspan><tspan x="420" dy="32">for-loop.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:36.00s"><tspan x="420" dy="0">prod is the only staging that tells the</tspan><tspan x="420" dy="32">truth.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:39.60s"><tspan x="420" dy="0">every manual process is a script nobody</tspan><tspan x="420" dy="32">wrote yet.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:43.20s"><tspan x="420" dy="0">most 'AI strategy' is three prompts in a</tspan><tspan x="420" dy="32">trench coat.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:46.80s"><tspan x="420" dy="0">ship it tuesday, feel things about it</tspan><tspan x="420" dy="32">wednesday.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:50.40s"><tspan x="420" dy="0">i don’t have work-life balance, i have a</tspan><tspan x="420" dy="32">deploy pipeline.</tspan></text>
    <text class="t" x="420" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#e9e9ff" style="animation-delay:54.00s"><tspan x="420" dy="0">senior means you delete more than you</tspan><tspan x="420" dy="32">add.</tspan></text>
    <text x="810" y="150" text-anchor="end" font-size="12" fill="#39ff14">— rxit</text>
    <rect x="7" y="7" width="826" height="154" rx="13" fill="none" stroke="url(#hedge)" stroke-width="1.3" opacity="0.85"/>
  </g>
</svg>

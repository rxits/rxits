      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">vector embeddings turn meaning into</tspan><tspan x="420" dy="30">coordinates you can literally do math on.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">tech fact</text>
    </g>

      <text x="420" y="104" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">the best team i ever hired was a for-loop.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">— rxit</text>
    </g>
    <g class="s" style="animation-delay:36.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#39ff14">▸ FACT</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">Next.js server components render on the</tspan><tspan x="420" dy="30">server, so the browser ships less JS.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">tech fact</text>
    </g>

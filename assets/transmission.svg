      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#00f0ff">▸ NEWS</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">SnapState - Persistent state for AI agent</tspan><tspan x="420" dy="30">workflows</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">snapstate.dev</text>

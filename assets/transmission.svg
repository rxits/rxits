<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 172" width="840" height="172" fill="none" role="img" aria-label="transmission — Claude &amp; modern tech news, facts, hot takes">
  <title>rxit.os // transmission</title>
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d0d20"/><stop offset="1" stop-color="#100a1c"/></linearGradient>
    <linearGradient id="tedge" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00f0ff"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
    <clipPath id="tw"><rect x="6" y="6" width="828" height="160" rx="14"/></clipPath>
    <style>
      text{ font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace }
      .s{ opacity:0; animation:cyc 84.0s linear infinite }
      @keyframes cyc{0%{opacity:0}0.6%{opacity:1}5.74%{opacity:1}6.54%{opacity:0}100%{opacity:0}}
      .p{ animation:pl 1.5s ease-in-out infinite } @keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
      @media (prefers-reduced-motion:reduce){ .s{animation:none} .s:first-of-type{opacity:1} .p{animation:none} }
    </style>
  </defs>
  <g clip-path="url(#tw)">
    <rect x="6" y="6" width="828" height="160" rx="14" fill="url(#tbg)"/>
    <circle cx="30" cy="34" r="5" fill="#00f0ff" class="p"/>
    <text x="44" y="39" font-size="12" letter-spacing="3" fill="#00f0ff">◉ rxit.os // transmission</text>
    <text x="810" y="39" text-anchor="end" font-size="11" fill="#7f7fb0">Claude &amp; modern tech · auto-rotating</text>
    <line x1="20" y1="52" x2="820" y2="52" stroke="#2a2a55" stroke-opacity="0.5"/>
    <g class="s" style="animation-delay:0.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#ff2ee6">▸ HOT TAKE</text>
      <text x="420" y="104" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">if it isn't live, it's a rumor.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">— rxit</text>
    </g>
    <g class="s" style="animation-delay:6.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#39ff14">▸ FACT</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">TypeScript's types vanish at runtime — a</tspan><tspan x="420" dy="30">compile-time safety net, nothing more.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">tech fact</text>
    </g>
    <g class="s" style="animation-delay:12.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#39ff14">▸ FACT</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">streaming makes an LLM feel faster — tokens</tspan><tspan x="420" dy="30">render as they’re generated.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">tech fact</text>
    </g>
    <g class="s" style="animation-delay:18.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#00f0ff">▸ NEWS</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">Apple targets dozens of OpenAI employees</tspan><tspan x="420" dy="30">with legal letters</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">ft.com</text>
    </g>
    <g class="s" style="animation-delay:24.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#00f0ff">▸ NEWS</text>
      <text x="420" y="104" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">Mozilla: The state of open source AI</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">stateofopensource.ai</text>
    </g>
    <g class="s" style="animation-delay:30.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#39ff14">▸ FACT</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">prompt caching can cut repeated-context LLM</tspan><tspan x="420" dy="30">costs by up to ~90%.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">tech fact</text>
    </g>
    <g class="s" style="animation-delay:36.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#ff2ee6">▸ HOT TAKE</text>
      <text x="420" y="104" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">the demo is the spec.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">— rxit</text>
    </g>
    <g class="s" style="animation-delay:42.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#00f0ff">▸ NEWS</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">$100 AI Music Video: Claude Fable 5 vs.</tspan><tspan x="420" dy="30">GPT-5.6 Sol</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">tryai.dev</text>
    </g>
    <g class="s" style="animation-delay:48.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#39ff14">▸ FACT</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">MCP (Model Context Protocol) is a standard</tspan><tspan x="420" dy="30">that lets any agent plug into any tool.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">tech fact</text>
    </g>
    <g class="s" style="animation-delay:54.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#00f0ff">▸ NEWS</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">LM Studio Bionic: the AI agent for open</tspan><tspan x="420" dy="30">models</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">lmstudio.ai</text>
    </g>
    <g class="s" style="animation-delay:60.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#39ff14">▸ FACT</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">Claude is named after Claude Shannon, the</tspan><tspan x="420" dy="30">father of information theory.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">tech fact</text>
    </g>
    <g class="s" style="animation-delay:66.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#ff2ee6">▸ HOT TAKE</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">ship it tuesday, feel things about it</tspan><tspan x="420" dy="30">wednesday.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">— rxit</text>
    </g>
    <g class="s" style="animation-delay:72.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#ff2ee6">▸ HOT TAKE</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">one human, a fleet of agents, zero</tspan><tspan x="420" dy="30">all-hands.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">— rxit</text>
    </g>
    <g class="s" style="animation-delay:78.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#ff2ee6">▸ HOT TAKE</text>
      <text x="420" y="104" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">senior means you delete more than you add.</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">— rxit</text>
    </g>
    <rect x="7" y="7" width="826" height="158" rx="13" fill="none" stroke="url(#tedge)" stroke-width="1.3" opacity="0.85"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 172" width="840" height="172" fill="none" role="img" aria-label="open to work — roles, stack, and how to reach rxit">
  <title>rxit.os // open to work</title>
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d0d20"/><stop offset="1" stop-color="#100a1c"/></linearGradient>
    <linearGradient id="tedge" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00f0ff"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
    <clipPath id="tw"><rect x="6" y="6" width="828" height="160" rx="14"/></clipPath>
    <style>
      text{ font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace }
      .s{ opacity:0; animation:cyc 24.0s linear infinite }
      @keyframes cyc{0%{opacity:0}0.6%{opacity:1}23.60%{opacity:1}24.40%{opacity:0}100%{opacity:0}}
      .p{ animation:pl 1.5s ease-in-out infinite } @keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
      @media (prefers-reduced-motion:reduce){ .s{animation:none} .s:first-of-type{opacity:1} .p{animation:none} }
    </style>
  </defs>
  <g clip-path="url(#tw)">
    <rect x="6" y="6" width="828" height="160" rx="14" fill="url(#tbg)"/>
    <circle cx="30" cy="34" r="5" fill="#39ff14" class="p"/>
    <text x="44" y="39" font-size="12" letter-spacing="3" fill="#39ff14">◉ rxit.os // open to work</text>
    <text x="810" y="39" text-anchor="end" font-size="11" fill="#7f7fb0">remote · international · available now</text>
    <line x1="20" y1="52" x2="820" y2="52" stroke="#2a2a55" stroke-opacity="0.5"/>
    <g class="s" style="animation-delay:0.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#39ff14">▸ OPEN TO</text>
      <text x="420" y="90" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">AI / Full-stack Engineer · remote,</tspan><tspan x="420" dy="30">international</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">available now</text>
    </g>
    <g class="s" style="animation-delay:6.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#00f0ff">▸ STACK</text>
      <text x="420" y="104" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">TypeScript · Next.js · Python · Dart/Flutter</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">shipped in prod</text>
    </g>
    <g class="s" style="animation-delay:12.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#ff2ee6">▸ BUILDING</text>
      <text x="420" y="104" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">Aumiqx — an agent-run software studio</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">founder</text>
    </g>
    <g class="s" style="animation-delay:18.00s">
      <text x="30" y="76" font-size="12" letter-spacing="3" fill="#00f0ff">▸ REACH</text>
      <text x="420" y="104" text-anchor="middle" font-size="20" font-weight="700" fill="#e9e9ff"><tspan x="420" dy="0">rakshitsharma4179@gmail.com</tspan></text>
      <text x="810" y="150" text-anchor="end" font-size="12" fill="#7f7fb0">— rxit</text>
    </g>
    <rect x="7" y="7" width="826" height="158" rx="13" fill="none" stroke="url(#tedge)" stroke-width="1.3" opacity="0.85"/>
  </g>
</svg>

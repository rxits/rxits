<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 130" width="840" height="130" fill="none" role="img" aria-label="live telemetry">
  <title>live telemetry — auto-synced from GitHub</title>
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d0d20"/><stop offset="1" stop-color="#100a1c"/></linearGradient>
    <linearGradient id="tedge" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00f0ff"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
    <clipPath id="tw"><rect x="6" y="6" width="828" height="118" rx="14"/></clipPath>
    <style>
      text{ font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace; }
      .d{ fill:#7f7fb0 } .w{ fill:#e9e9ff } .c{ fill:#00f0ff } .g{ fill:#39ff14 }
      .p{ animation:pl 1.6s ease-in-out infinite } @keyframes pl{ 0%,100%{opacity:1} 50%{opacity:.25} }
      @media (prefers-reduced-motion:reduce){ .p{animation:none} }
    </style>
  </defs>
  <g clip-path="url(#tw)">
    <rect x="6" y="6" width="828" height="118" rx="14" fill="url(#tbg)"/>
    <circle cx="30" cy="30" r="5" fill="#39ff14" class="p"/>
    <text x="44" y="35" font-size="12" letter-spacing="3" class="g">LIVE TELEMETRY</text>
    <text x="814" y="35" text-anchor="end" font-size="11" class="d">synced 2026-07-17 04:31 UTC</text>
    <line x1="20" y1="46" x2="820" y2="46" stroke="#2a2a55" stroke-opacity="0.5"/>
    <text x="60" y="70" font-size="34" font-weight="700" class="w">0</text><text x="60" y="94" font-size="11" letter-spacing="2" class="d">COMMITS / 30d</text><line x1="228" y1="44" x2="228" y2="92" stroke="#2a2a55" stroke-opacity="0.5"/>
    <text x="255" y="70" font-size="34" font-weight="700" class="w">24</text><text x="255" y="94" font-size="11" letter-spacing="2" class="d">PUBLIC REPOS</text><line x1="423" y1="44" x2="423" y2="92" stroke="#2a2a55" stroke-opacity="0.5"/>
    <text x="450" y="70" font-size="34" font-weight="700" class="w">5</text><text x="450" y="94" font-size="11" letter-spacing="2" class="d">FOLLOWERS</text><line x1="618" y1="44" x2="618" y2="92" stroke="#2a2a55" stroke-opacity="0.5"/>
    <text x="645" y="70" font-size="34" font-weight="700" class="w">3m ago</text><text x="645" y="94" font-size="11" letter-spacing="2" class="d">LAST SHIP</text>
    <rect x="7" y="7" width="826" height="116" rx="13" fill="none" stroke="url(#tedge)" stroke-width="1.3" opacity="0.85"/>
  </g>
</svg>

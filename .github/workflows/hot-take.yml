name: hot-take

on:
  schedule:
    - cron: '41 */6 * * *'   # reshuffle the rotation order every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hot-take
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Reshuffle hot-takes
        run: node scripts/gen-hottake.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/hot-take.svg
          git diff --staged --quiet || git commit -m "chore: reshuffle hot-takes [skip ci]"
          git push

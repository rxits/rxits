name: live-signal

on:
  schedule:
    - cron: '23 */4 * * *'   # every 4 hours
  workflow_dispatch:          # run on demand from the Actions tab

permissions:
  contents: write

concurrency:
  group: live-signal
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch a fresh signal
        run: node scripts/gen-news.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/news.svg
          git diff --staged --quiet || git commit -m "chore: refresh incoming signal [skip ci]"
          git push

name: signal-wall

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: signal-wall

jobs:
  post:
    # visitors can't set labels, so gate on the title marker from the prefilled link
    if: startsWith(github.event.issue.title, 'signal')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Add signal + render wall
        env:
          SIGNAL_USER: ${{ github.event.issue.user.login }}
          SIGNAL_BODY: ${{ github.event.issue.body }}
        run: node scripts/signal-wall.mjs
      - name: Commit the wall
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/signals.json assets/wall.svg
          git diff --staged --quiet || git commit -m "signal: new mark on the wall [skip ci]"
          git push
      - name: Thank the visitor and close
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "signal received — you're on the wall now. thanks for stopping by. 🖤"
          gh issue close "${{ github.event.issue.number }}"

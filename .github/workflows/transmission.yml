name: transmission

on:
  schedule:
    - cron: '31 */4 * * *'   # refresh news/facts every 4 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: transmission
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Refresh transmission (news + facts + takes)
        run: node scripts/gen-transmission.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/transmission.svg
          git diff --staged --quiet || git commit -m "chore: refresh transmission [skip ci]"
          git push

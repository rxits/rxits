name: live-telemetry

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours
  workflow_dispatch:          # lets you run it on demand from the Actions tab

permissions:
  contents: write

concurrency:
  group: live-telemetry
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate telemetry SVG
        run: node scripts/gen-telemetry.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/telemetry.svg
          git diff --staged --quiet || git commit -m "chore: refresh live telemetry [skip ci]"
          git push
